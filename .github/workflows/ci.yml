name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  test:
    name: Test + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo test --all-features
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit + cargo-deny binaries
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-tools-audit-deny-v1

      - name: Install cargo-audit
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Install cargo-deny
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --locked

      - run: cargo audit
      - run: cargo deny check

  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - run: wasm-pack build --target bundler --release

      - name: Verify WASM size
        run: |
          WASM_SIZE=$(stat -c%s pkg/schemasniff_bg.wasm)
          echo "WASM size: $WASM_SIZE bytes"
          if [ "$WASM_SIZE" -lt 102400 ]; then
            echo "ERROR: .wasm is suspiciously small"
            exit 1
          fi

      - name: Upload pkg/
        uses: actions/upload-artifact@v4
        with:
          name: schemasniff-pkg
          path: pkg/
          retention-days: 7

  fuzz:
    name: Fuzz smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo-fuzz binary
        id: cache-fuzz
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: ${{ runner.os }}-cargo-fuzz-v1

      - name: Install cargo-fuzz
        if: steps.cache-fuzz.outputs.cache-hit != 'true'
        run: cargo install cargo-fuzz --locked

      - run: cargo +nightly fuzz run fuzz_csv          -- -max_total_time=30
      - run: cargo +nightly fuzz run fuzz_json         -- -max_total_time=30
      - run: cargo +nightly fuzz run fuzz_nul_nonutf8  -- -max_total_time=30
      - run: cargo +nightly fuzz run fuzz_deep_json    -- -max_total_time=30
